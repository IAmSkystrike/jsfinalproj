<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Interactive Photo Gallery</title>
	<link rel="stylesheet" href="css/gallery.css">
	<script src = "js/gallery.js"></script>
</head>
<body onload = "tabIndex()">
	<h1>What Does This Flower Mean...?</h1>
	<div id = "image">
		<p id="alttext">Hover over a flower to learn about its cultural symbolism!</p>
	</div>
	<img class = "preview" alt = "Chrysanthemum - Longevity, Rejuvenation, something grand coming back into one's life." src = "imgs/chrysanthemum.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus = "upDate(this)" onblur = "unDo()">
	<img class = "preview" alt = "Dutch Iris - Friendship, Faith, Good News, or just to accompany a message." src = "imgs/iris.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus = "upDate(this)" onblur = "unDo()">
	<img class = "preview" alt = "Mountain Arnica - Offering aid to heal one's grief, 'I'm Here For You'." src = "imgs/mountainarnica.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus = "upDate(this)" onblur = "unDo()">
	<img class = "preview" alt = "Primrose - Eternal Love or Childhood, 'May We Never Part Ways'." src = "imgs/primrose.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus = "upDate(this)" onblur = "unDo()">
	<img class = "preview" alt = "Red Poppy - Remembrance of someone fallen, usually in war. A brave sacrifice." src = "imgs/redpoppy.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus = "upDate(this)" onblur = "unDo()">
	<img class = "preview" alt = "Water Lotus - Purity of Mind and Soul, Enlightenment, Rebirth." src = "imgs/waterlotus.jpg" onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus = "upDate(this)" onblur = "unDo()">
</body>
</html>
